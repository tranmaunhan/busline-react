name: Deploy React to VPS

on:
    push:
        branches:
            - main

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout source code
              uses: actions/checkout@v4

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: ${{ secrets.DOCKER_USERNAME }}/busline-react:latest

            - name: Deploy to VPS
              uses: appleboy/ssh-action@v1.2.0
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  script: |
                      docker pull ${{ secrets.DOCKER_USERNAME }}/busline-react:latest
                      docker rm -f busline-react || true
                      docker run -d \
                        --name busline-react \
                        --restart unless-stopped \
                        -p 10000:80 \
                        ${{ secrets.DOCKER_USERNAME }}/busline-react:latest
