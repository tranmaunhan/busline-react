<!doctype html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VéXe.vn - Đăng Nhập</title>
    <script src="/_sdk/element_sdk.js"></script>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        .login-container {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 50%, #ffa500 100%);
        }

        .form-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        .input-field {
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: #ff6b35;
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }

        .btn-login {
            background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .demo-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #fef3c7;
            color: #92400e;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .checkbox-custom {
            accent-color: #ff6b35;
            cursor: pointer;
        }

        .divider-text {
            position: relative;
            text-align: center;
            margin: 24px 0;
        }

        .divider-text::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: #e5e7eb;
        }

        .divider-text span {
            position: relative;
            background: white;
            padding: 0 12px;
            color: #9ca3af;
            font-size: 14px;
        }

        .social-btn {
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            padding: 10px 16px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
        }

        .social-btn:hover {
            border-color: #ff6b35;
            background: #fff7f3;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-card {
            animation: slideIn 0.6s ease-out;
        }

        .form-group {
            animation: slideIn 0.6s ease-out;
        }

        .form-group:nth-child(2) {
            animation-delay: 0.1s;
        }

        .form-group:nth-child(3) {
            animation-delay: 0.2s;
        }
    </style>
    <style>
        body {
            box-sizing: border-box;
        }
    </style>
    <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
</head>

<body class="bg-gray-50">
    <div class="login-container">
        <div class="form-card w-full max-w-md mx-4 relative">
            <div class="demo-badge"><i data-lucide="info" style="width: 14px; height: 14px;"></i> Demo
            </div><!-- Header -->
            <div class="bg-gradient-to-b gradient-bg px-8 pt-8 pb-6 text-center">
                <div class="flex items-center justify-center gap-2 mb-2">
                    <div class="text-4xl font-bold text-white">
                        VéXe
                    </div>
                    <div class="text-4xl font-bold text-orange-100">
                        .vn
                    </div>
                </div>
                <p class="text-orange-100 text-sm">Đặt vé xe - Yên tâm đi lại</p>
            </div><!-- Form -->
            <div class="px-8 py-8"><!-- Email -->
                <div class="form-group mb-5"><label class="block text-sm font-semibold text-gray-700 mb-2">Email hoặc Số
                        điện thoại</label> <input type="text" class="input-field w-full"
                        placeholder="example@email.com hoặc 0912345678">
                </div><!-- Password -->
                <div class="form-group mb-2"><label class="block text-sm font-semibold text-gray-700 mb-2">Mật
                        khẩu</label> <input type="password" class="input-field w-full" placeholder="••••••••">
                </div><!-- Forgot Password -->
                <div class="text-right mb-6"><a href="#"
                        class="text-sm text-orange-500 hover:text-orange-600 font-medium transition">Quên mật khẩu?</a>
                </div><!-- Login Button --> <button class="btn-login mb-6"> Đăng Nhập </button> <!-- Remember Me -->
                <div class="flex items-center gap-2 mb-6"><input type="checkbox" id="remember" class="checkbox-custom"
                        style="width: 16px; height: 16px;"> <label for="remember"
                        class="text-sm text-gray-600 cursor-pointer">Ghi nhớ tôi trên thiết bị này</label>
                </div><!-- Divider -->
                <div class="divider-text"><span>hoặc đăng nhập bằng</span>
                </div><!-- Social Login -->
                <div class="grid grid-cols-2 gap-3 mb-6"><button class="social-btn"> <i data-lucide="facebook"
                            style="width: 18px; height: 18px; color: #1877f2;"></i> Facebook </button> <button
                        class="social-btn"> <i data-lucide="mail"
                            style="width: 18px; height: 18px; color: #ea4335;"></i> Google </button>
                </div><!-- Sign Up Link -->
                <p class="text-center text-sm text-gray-600">Chưa có tài khoản? <a href="#"
                        class="text-orange-500 hover:text-orange-600 font-semibold transition">Đăng ký ngay</a></p>
            </div><!-- Footer -->
            <div class="bg-gray-50 px-8 py-4 border-t border-gray-200">
                <div class="flex items-center justify-center gap-4 text-xs text-gray-500"><a href="#"
                        class="hover:text-orange-500 transition">Điều khoản</a> <span>•</span> <a href="#"
                        class="hover:text-orange-500 transition">Chính sách</a> <span>•</span> <a href="#"
                        class="hover:text-orange-500 transition">Liên hệ</a>
                </div>
            </div>
        </div>
    </div>
    <script>
        lucide.createIcons();
    </script>

</body>

</html>
